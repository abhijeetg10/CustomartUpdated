<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Rest In Peace, Page | CustomArt</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #E3B341; --dark: #0b1220; }
        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--dark);
            color: white;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
            overflow: hidden;
        }
        .container { padding: 20px; max-width: 600px; }
        .meme-gif {
            width: 100%;
            max-width: 450px;
            border-radius: 15px;
            border: 4px solid var(--primary);
            box-shadow: 0 0 30px rgba(227, 179, 65, 0.4);
            margin-bottom: 20px;
        }
        h1 { font-size: 5rem; margin: 0; color: var(--primary); }
        p { color: #a1a1aa; margin-bottom: 30px; }
        
        .controls { margin-bottom: 20px; }
        .btn {
            background: var(--primary);
            color: #fff;
            padding: 15px 40px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 700;
            display: inline-block;
            transition: 0.3s;
            cursor: pointer;
            border: none;
        }
        .btn:hover { transform: scale(1.05); }
        .mute-btn {
            background: transparent;
            color: var(--primary);
            border: 1px solid var(--primary);
            padding: 8px 15px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 12px;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <div class="container">
        <img src="https://media.giphy.com/media/j6ZlX8ghxNFRknObVk/giphy.gif" alt="Coffin Dance" class="meme-gif">
        
        <h1>404</h1>
        <h2>This page is officially dead.</h2>
        <p>Press the button to hear the final rites (Music On).</p>
        
        <div class="controls">
            <button class="btn" onclick="playMusic()">Return to Studio</button>
            <br>
            <button id="muteBtn" class="mute-btn" onclick="toggleMute()">🔇 Unmute Music</button>
        </div>

        <audio id="coffinMusic" loop>
            <source src="https://www.myinstants.com/media/sounds/astronomia.mp3" type="audio/mpeg">
        </audio>
    </div>

    <script>
        const music = document.getElementById('coffinMusic');
        const muteBtn = document.getElementById('muteBtn');

        function playMusic() {
            // First time click plays music then redirects
            music.play();
            setTimeout(() => {
                window.location.href = "index.html";
            }, 2000); // 2 second delay so they hear the beat drop
        }

        function toggleMute() {
            if (music.paused) {
                music.play();
                muteBtn.innerText = "🔊 Mute Music";
            } else {
                music.pause();
                muteBtn.innerText = "🔇 Unmute Music";
            }
        }
    </script>
</body>
</html>
